{% extends "auctions/layout.html" %}

{% block body %}
    <h2>Active Listings</h2>
    
    {% for listing in listings %}
        <div class="listing">
            {% if listing.image %}
                <img src="{{ listing.image.url }}" alt="{{ listing.title }}" width = "300" class="listing_image">
            {% endif %}
            <div class="listing_info">
            <h3>{{ listing.title }}</h3>
            <p>{{ listing.description }}</p>
            </div>
        </div>
    {% endfor %}
{% endblock %}
