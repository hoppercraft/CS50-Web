{% extends "auctions/layout.html" %}

{% block body %}
<h1>Listing: {{ listing.title }}</h1>
{% if listing.image %}
    <img src="{{ listing.image.url }}" width = "400" class="listing_image">
{% endif %}
<p>{{ listing.description }}</p>
<h2>${{listing.bid}}</h2>
<h3 style="font-weight: 600;">Details</h3>
    <ul>
        <li>Listed by: {{listing.owner}}</li>
        <li>Category:</li>
    </ul>
{% endblock %}
